[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "axiom-tests"
version = "0.1.0"
description = "AEOS-conformance test infrastructure for Axiom ecosystem extensions"
readme = "README.md"
requires-python = ">=3.11"
license = { text = "Apache-2.0" }
authors = [
    { name = "B-Tree Labs", email = "no-reply@axiom-os.ai" },
    { name = "B-Tree Ventures, LLC" },
]
keywords = ["aeos", "axiom", "pytest", "testing", "extensions"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Framework :: Pytest",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: Apache Software License",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Programming Language :: Python :: 3.14",
    "Topic :: Software Development :: Testing",
    "Topic :: Software Development :: Testing :: Unit",
]
dependencies = [
    "pytest>=8",
    "pydantic>=2",
    "hypothesis>=6",
    "jsonschema>=4",
]

[project.optional-dependencies]
dev = [
    "pytest-cov>=4",
    "ruff>=0.5",
]

[project.urls]
Homepage = "https://github.com/b-tree-labs/axiom-os"
Repository = "https://github.com/b-tree-labs/axiom-os"
Documentation = "https://github.com/b-tree-labs/axiom-os/docs/aeos"

[project.entry-points.pytest11]
axiom_tests = "axiom_tests.plugin"

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-data]
axiom_tests = ["schemas/*.json", "py.typed"]

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
addopts = "-ra --strict-markers"
markers = [
    "integration: integration-level tests (may need network or live services)",
]

[tool.coverage.run]
branch = true
source = ["axiom_tests"]

[tool.coverage.report]
show_missing = true
skip_covered = false
exclude_lines = [
    "pragma: no cover",
    "raise NotImplementedError",
    "if TYPE_CHECKING:",
    "@abstractmethod",
]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "W", "I", "UP", "B"]
ignore = ["E501"]
