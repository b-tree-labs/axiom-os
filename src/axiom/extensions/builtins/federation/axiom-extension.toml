[extension]
name = "federation"
version = "0.1.0"
description = "Multi-node federation — discovery, identity, resource sharing"
license = "Apache-2.0"
owner = "b-tree-labs"
aeos_version = "0.1.0"
builtin = true

[extension.compatibility]
python = ">= 3.11"
axiom = ">= 0.10"

[[extension.provides]]
kind = "cmd"
noun = "federation"
entry = "axiom.extensions.builtins.federation.cli:main"
description = "Manage federation membership and resources"
tier = "core"
intent_groups = ["govern"]

[[extension.provides]]
kind = "cmd"
noun = "nodes"
entry = "axiom.extensions.builtins.federation.nodes_cli:main"
description = "Fleet view — monitor and manage Axiom nodes"
tier = "advanced"
intent_groups = ["operate"]

[[extension.provides]]
kind = "cmd"
noun = "knowledge"
entry = "axiom.extensions.builtins.federation.knowledge_cli:main"
description = "Knowledge observatory — velocity, accumulation, and impact metrics"
tier = "advanced"
intent_groups = ["investigate"]

[[extension.provides]]
kind = "cmd"
noun = "research"
entry = "axiom.extensions.builtins.federation.research_cli:main"
description = "Call to Research — distributed research coordination"
tier = "advanced"
intent_groups = ["research"]

[[extension.provides]]
kind = "cmd"
noun = "security"
entry = "axiom.extensions.builtins.federation.security_cli:security_main"
description = "Federation security — trust graph, signatures, classification"
tier = "advanced"
intent_groups = ["govern"]

[[extension.provides]]
kind = "cmd"
noun = "chaos"
entry = "axiom.extensions.builtins.federation.security_cli:chaos_main"
description = "Chaos test framework — federation resilience testing"
tier = "advanced"
intent_groups = ["maintain"]
