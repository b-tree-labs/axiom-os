[extension]
name = "note"
version = "0.1.0"
description = "Quick personal notes — captured immediately to RAG-indexed daily log"
license = "Apache-2.0"
owner = "b-tree-labs"
aeos_version = "0.1.0"
builtin = true

[extension.compatibility]
python = ">= 3.11"
axiom = ">= 0.10"

[[extension.provides]]
kind = "cmd"
noun = "note"
entry = "axiom.extensions.builtins.note.cli:main"
description = "Capture a quick note (auto-indexed into your daily log + RAG)"
tier = "starter"
intent_groups = ["start"]
