[extension]
name = "secrets"
version = "0.1.0"
description = "Operational secret store — SecretStoreProvider registry (OpenBao default). Distinct from KEEP/ADR-055; see docs/decisions/adr-001."
license = "Apache-2.0"
owner = "b-tree-labs"
aeos_version = "0.1.0"
builtin = true

[extension.compatibility]
python = ">= 3.11"
axiom = ">= 0.26"

# SEC-1 ships interface + registry only; no concrete providers, no CLI
# verbs (those land in SEC-2). The `service` kind is the resolver
# entry point other extensions consume via `secrets.resolve(ref, ctx)`.
[[extension.provides]]
kind = "service"
name = "secret_resolver"
entry = "axiom.extensions.builtins.secrets:resolve"
description = "Resolve a SecretRef through the registered SecretStoreProvider."
idempotent = true

# ``axi secrets`` — operator pre-flight CLI surface. ADR-056: each verb
# is backed 1:1 by a skill function under ``secrets/skills/``.
[[extension.provides]]
kind = "cmd"
noun = "secrets"
entry = "axiom.extensions.builtins.secrets.cli:main"
subcommands = ["diagnose"]
