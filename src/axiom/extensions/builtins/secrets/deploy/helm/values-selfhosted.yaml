# SELF-HOSTED overlay — single-node, persistent, SEALED, TLS-ready.
#
#   helm install sec src/axiom/extensions/builtins/secrets/deploy/helm \
#     -f src/axiom/extensions/builtins/secrets/deploy/helm/values-selfhosted.yaml
#
# Storage lives on a PVC (file backend). The server starts SEALED and
# must be initialized + unsealed once (operator step, or KMS auto-unseal).
# See deploy/README.md § Unseal & bootstrap-trust.
server:
  mode: "sealed"

  storage:
    backend: "file"          # file = single-node simplicity; "raft" for future HA
    size: "2Gi"
    storageClass: ""         # empty = cluster default

  # disableMlock=true is the safe container default. Set false ONLY on a
  # host that disables swap; the chart then adds the IPC_LOCK capability.
  disableMlock: true

  listener:
    tlsDisable: true         # flip to false to serve HTTPS...
    tlsSecretName: ""        # ...and set a k8s TLS secret (tls.crt/tls.key) here
    tlsCertFile: "/openbao/tls/tls.crt"
    tlsKeyFile: "/openbao/tls/tls.key"

  # Empty seal = manual `bao operator unseal` on every restart. Set a KMS
  # or transit backend for hands-off auto-unseal (recommended for prod).
  seal:
    type: ""
    config: {}

resources:
  requests: { memory: "128Mi", cpu: "100m" }
  limits:   { memory: "512Mi", cpu: "500m" }

service:
  type: "ClusterIP"
