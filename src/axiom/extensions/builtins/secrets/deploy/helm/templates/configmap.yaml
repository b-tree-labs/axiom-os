{{- if ne .Values.server.mode "dev" }}
# OpenBao HCL config — sealed mode only. Dev mode is configured entirely
# via `bao server -dev ...` flags (see statefulset.yaml) and needs no
# config file. Mounted read-only at /openbao/config/config.hcl.
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "axiom-secrets.fullname" . }}-config
  labels:
    {{- include "axiom-secrets.labels" . | nindent 4 }}
    component: openbao
data:
  config.hcl: |
    ui            = {{ .Values.server.ui }}
    disable_mlock = {{ .Values.server.disableMlock }}
    api_addr      = "{{ include "axiom-secrets.apiAddr" . }}"

    listener "tcp" {
      address = "{{ .Values.server.listener.address }}"
    {{- if .Values.server.listener.tlsDisable }}
      tls_disable = "true"
    {{- else }}
      tls_cert_file = "{{ .Values.server.listener.tlsCertFile }}"
      tls_key_file  = "{{ .Values.server.listener.tlsKeyFile }}"
    {{- end }}
    }

    {{- if eq .Values.server.storage.backend "raft" }}
    storage "raft" {
      path    = "{{ .Values.server.storage.mountPath }}"
      node_id = "{{ include "axiom-secrets.fullname" . }}-0"
    }
    cluster_addr = "{{ include "axiom-secrets.clusterAddr" . }}"
    {{- else }}
    storage "file" {
      path = "{{ .Values.server.storage.mountPath }}"
    }
    {{- end }}

    {{- if .Values.server.seal.type }}
    # Auto-unseal — the master key is wrapped by the external KMS/transit
    # backend below; no unseal keys are held by this chart.
    seal "{{ .Values.server.seal.type }}" {
      {{- range $k, $v := .Values.server.seal.config }}
      {{ $k }} = "{{ $v }}"
      {{- end }}
    }
    {{- end }}
{{- end }}
