{{- if eq .Values.server.mode "dev" }}
# DEV MODE ONLY. OpenBao dev is in-memory, auto-unsealed, and ephemeral —
# every restart wipes all stored secrets. This Secret holds the well-known
# dev root token purely so the Axiom `secrets` extension can wire
# AXIOM_OPENBAO_TOKEN for fast local iteration. A sealed deployment renders
# NO token Secret: the operator mints a scoped token out-of-band (see
# deploy/README.md), and the chart never writes a root token to cluster
# storage.
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "axiom-secrets.fullname" . }}-token
  labels:
    {{- include "axiom-secrets.labels" . | nindent 4 }}
    component: openbao
type: Opaque
stringData:
  token: {{ required "server.dev.rootToken is required in dev mode" .Values.server.dev.rootToken | quote }}
{{- end }}
