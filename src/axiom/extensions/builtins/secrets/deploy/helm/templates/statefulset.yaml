apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "axiom-secrets.fullname" . }}
  labels:
    {{- include "axiom-secrets.labels" . | nindent 4 }}
    component: openbao
spec:
  serviceName: {{ include "axiom-secrets.fullname" . }}-internal
  replicas: 1
  selector:
    matchLabels:
      {{- include "axiom-secrets.selectorLabels" . | nindent 6 }}
      component: openbao
  template:
    metadata:
      labels:
        {{- include "axiom-secrets.selectorLabels" . | nindent 8 }}
        component: openbao
      {{- if ne .Values.server.mode "dev" }}
      annotations:
        # Roll the pod when the HCL config changes.
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "axiom-secrets.serviceAccountName" . }}
      {{- with .Values.image.pullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: openbao
          image: "{{ .Values.image.registry }}/{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy | default "IfNotPresent" }}
          {{- if eq .Values.server.mode "dev" }}
          # Dev server: in-memory, auto-unsealed, ephemeral. LOCAL ONLY.
          command: ["bao"]
          args:
            - "server"
            - "-dev"
            - "-dev-root-token-id=$(BAO_DEV_ROOT_TOKEN_ID)"
            - "-dev-listen-address=0.0.0.0:8200"
          {{- else }}
          # Sealed server: starts sealed, awaits `bao operator init` +
          # unseal (or KMS auto-unseal). Persists to the data PVC.
          command: ["bao"]
          args:
            - "server"
            - "-config=/openbao/config/config.hcl"
          {{- end }}
          {{- if not .Values.server.disableMlock }}
          # IPC_LOCK lets OpenBao mlock memory so secrets never swap to
          # disk. Only needed when disable_mlock=false.
          securityContext:
            capabilities:
              add: ["IPC_LOCK"]
          {{- end }}
          ports:
            - name: http
              containerPort: 8200
            {{- if eq .Values.server.storage.backend "raft" }}
            - name: cluster
              containerPort: 8201
            {{- end }}
          env:
            {{- if eq .Values.server.mode "dev" }}
            - name: BAO_DEV_ROOT_TOKEN_ID
              valueFrom:
                secretKeyRef:
                  name: {{ include "axiom-secrets.fullname" . }}-token
                  key: token
            {{- end }}
            - name: BAO_ADDR
              value: "http://127.0.0.1:8200"
          livenessProbe:
            # standbyok + sealedcode/uninitcode=200 so a SEALED-but-alive
            # pod (awaiting unseal) is not killed by the kubelet.
            httpGet:
              path: "/v1/sys/health?standbyok=true&sealedcode=200&uninitcode=200"
              port: http
              {{- if not .Values.server.listener.tlsDisable }}
              scheme: HTTPS
              {{- end }}
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            # Ready only when unsealed + active — a sealed instance returns
            # 503 and receives no client traffic (correct fail-closed).
            httpGet:
              path: "/v1/sys/health?standbyok=true"
              port: http
              {{- if not .Values.server.listener.tlsDisable }}
              scheme: HTTPS
              {{- end }}
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          {{- if ne .Values.server.mode "dev" }}
          volumeMounts:
            - name: config
              mountPath: /openbao/config
              readOnly: true
            - name: data
              mountPath: {{ .Values.server.storage.mountPath }}
            {{- if and (not .Values.server.listener.tlsDisable) .Values.server.listener.tlsSecretName }}
            - name: tls
              mountPath: /openbao/tls
              readOnly: true
            {{- end }}
          {{- end }}
      {{- if ne .Values.server.mode "dev" }}
      volumes:
        - name: config
          configMap:
            name: {{ include "axiom-secrets.fullname" . }}-config
        {{- if and (not .Values.server.listener.tlsDisable) .Values.server.listener.tlsSecretName }}
        - name: tls
          secret:
            secretName: {{ .Values.server.listener.tlsSecretName }}
        {{- end }}
      {{- end }}
  {{- if ne .Values.server.mode "dev" }}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: {{ .Values.server.storage.size }}
        {{- if .Values.server.storage.storageClass }}
        storageClassName: {{ .Values.server.storage.storageClass }}
        {{- end }}
  {{- end }}
