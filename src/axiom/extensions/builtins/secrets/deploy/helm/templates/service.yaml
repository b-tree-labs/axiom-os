# Headless governing service for the StatefulSet — stable per-pod DNS and
# raft peer discovery. publishNotReadyAddresses so an operator can still
# reach a SEALED (not-ready) pod to run `bao operator unseal`.
apiVersion: v1
kind: Service
metadata:
  name: {{ include "axiom-secrets.fullname" . }}-internal
  labels:
    {{- include "axiom-secrets.labels" . | nindent 4 }}
    component: openbao
spec:
  clusterIP: None
  publishNotReadyAddresses: true
  selector:
    {{- include "axiom-secrets.selectorLabels" . | nindent 4 }}
    component: openbao
  ports:
    - name: http
      port: 8200
      targetPort: http
    {{- if eq .Values.server.storage.backend "raft" }}
    - name: cluster
      port: 8201
      targetPort: cluster
    {{- end }}
---
# Client-facing service — this is the address the extension's
# AXIOM_OPENBAO_URL points at: {{ include "axiom-secrets.address" . }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "axiom-secrets.fullname" . }}
  labels:
    {{- include "axiom-secrets.labels" . | nindent 4 }}
    component: openbao
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "axiom-secrets.selectorLabels" . | nindent 4 }}
    component: openbao
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: http
      {{- if and (eq .Values.service.type "NodePort") (gt (int .Values.service.nodePort) 0) }}
      nodePort: {{ .Values.service.nodePort }}
      {{- end }}
