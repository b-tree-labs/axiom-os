# axiom-secrets Helm chart — default values.
#
# Stands up a self-hosted OpenBao server (the OSS Vault fork; HTTP API
# wire-compatible, image openbao/openbao, listens on :8200, health at
# /v1/sys/health) as the default operational SecretStore backend for the
# `secrets` extension (ADR-003).
#
# Two server postures, selected by `server.mode`:
#   dev    — in-memory, AUTO-UNSEALED, ephemeral, single root token.
#            LOCAL/dev ONLY (values-local.yaml). Every restart wipes all
#            secrets. Never use for real custody.
#   sealed — a real, persistent, SEALED server (values-selfhosted.yaml /
#            values-enclave.yaml). Unseal is an operator step or KMS
#            auto-unseal — the chart NEVER stores unseal keys or the root
#            token in cleartext. See deploy/README.md.

nameOverride: ""
fullnameOverride: ""

# ------------------------------------------------------------------------
# Image — registry/repository/tag are split so an air-gapped install can
# point `registry` at a local mirror without touching the rest.
# ------------------------------------------------------------------------
image:
  registry: "docker.io"          # air-gap: set to your in-cluster mirror host
  repository: "openbao/openbao"
  tag: "2.2.0"                    # pin to a vetted digest for air-gapped installs
  pullPolicy: "IfNotPresent"
  pullSecrets: []                # e.g. [{ name: mirror-pull }]

# ------------------------------------------------------------------------
# Server posture
# ------------------------------------------------------------------------
server:
  mode: "sealed"                 # dev | sealed  (sealed = fail-closed default)

  # dev-mode ONLY. Ignored when mode != dev.
  dev:
    # Well-known root token exposed via a k8s Secret so the extension can
    # wire AXIOM_OPENBAO_TOKEN for fast local iteration. NOT for production.
    rootToken: "root"

  # Persistent storage backend for sealed mode.
  storage:
    backend: "file"              # file | raft  (file = single-node simplicity)
    size: "2Gi"
    storageClass: ""             # empty = cluster default
    mountPath: "/openbao/data"

  # disable_mlock=true is required on hosts that don't grant IPC_LOCK or
  # disable swap. Set false only when the host disables swap AND the pod
  # is granted the IPC_LOCK capability (the chart adds it automatically).
  disableMlock: true

  # listener "tcp" stanza.
  listener:
    address: "0.0.0.0:8200"
    tlsDisable: true             # flip to false to serve HTTPS (see tlsSecretName)
    tlsSecretName: ""            # k8s TLS secret (keys tls.crt/tls.key) mounted at /openbao/tls
    tlsCertFile: "/openbao/tls/tls.crt"
    tlsKeyFile: "/openbao/tls/tls.key"

  # Auto-unseal seal stanza (sealed mode). Empty type = manual unseal
  # (`bao operator unseal`). Set a KMS/transit type for auto-unseal so
  # the server comes back unsealed after a restart with no operator step.
  # config is an opaque key/value map passed straight into the seal stanza.
  seal:
    type: ""                     # "" | awskms | gcpckms | azurekeyvault | transit
    config: {}                   # e.g. { region: us-east-1, kms_key_id: ... }

  ui: false

# ------------------------------------------------------------------------
# Pod resources
# ------------------------------------------------------------------------
resources:
  requests: { memory: "128Mi", cpu: "100m" }
  limits:   { memory: "512Mi", cpu: "500m" }

# ------------------------------------------------------------------------
# Service — clients reach OpenBao at http(s)://<fullname>:<port>. That
# address is what the extension's AXIOM_OPENBAO_URL points at.
# ------------------------------------------------------------------------
service:
  type: "ClusterIP"
  port: 8200
  nodePort: 0                    # only honored when type=NodePort

serviceAccount:
  create: true
  name: ""
  # Annotations for cloud IAM binding used by KMS auto-unseal
  # (e.g. IRSA / Workload Identity). Empty by default.
  annotations: {}

# ------------------------------------------------------------------------
# Extension wiring (documented; surfaced by NOTES.txt + the TF outputs).
# The `openbao` SecretStoreProvider reads these env at runtime:
#   AXIOM_OPENBAO_URL    -> http(s)://<fullname>:<port>   (this chart)
#   AXIOM_OPENBAO_TOKEN  -> a scoped token (dev: the dev root token Secret;
#                           sealed: minted by the operator out-of-band)
#   AXIOM_OPENBAO_MOUNT  -> extension.mount below (kv/v2 mount path)
# ------------------------------------------------------------------------
extension:
  mount: "kv"                    # AXIOM_OPENBAO_MOUNT (kv/v2 mount path)
