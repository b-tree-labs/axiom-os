# ENCLAVE overlay — air-gapped / resource-constrained. No external egress.
#
#   helm install sec src/axiom/extensions/builtins/secrets/deploy/helm \
#     -f src/axiom/extensions/builtins/secrets/deploy/helm/values-enclave.yaml
#
# The image is pulled from a LOCAL MIRROR: set image.registry to your
# in-cluster / on-prem registry host and pre-load openbao/openbao there.
# Nothing here assumes reachability to docker.io or any cloud endpoint.
image:
  registry: "registry.local"   # <-- your air-gapped mirror host
  repository: "openbao/openbao"
  tag: "2.2.0"                  # pin to a mirrored, vetted digest
  pullPolicy: "IfNotPresent"
  pullSecrets:
    - name: mirror-pull         # credential for the mirror, if it requires auth

server:
  mode: "sealed"

  storage:
    backend: "file"
    size: "1Gi"
    storageClass: ""

  disableMlock: true

  listener:
    tlsDisable: true            # terminate TLS at an in-mesh proxy, or set tlsSecretName

  # Air-gap: no cloud KMS is reachable. Unseal manually, or point a
  # "transit" seal at a peer OpenBao inside the enclave. Never a cloud KMS.
  seal:
    type: ""
    config: {}

# Tight limits for a constrained node.
resources:
  requests: { memory: "64Mi", cpu: "50m" }
  limits:   { memory: "256Mi", cpu: "250m" }

service:
  type: "ClusterIP"
