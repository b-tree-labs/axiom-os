# LOCAL / dev overlay — k3d, kind, or Docker-desktop k8s. Fast iteration.
#
#   helm install sec src/axiom/extensions/builtins/secrets/deploy/helm \
#     -f src/axiom/extensions/builtins/secrets/deploy/helm/values-local.yaml
#
# OpenBao runs in DEV MODE: in-memory, AUTO-UNSEALED, ephemeral. Every
# restart wipes all secrets. Never use this profile for real custody.
server:
  mode: "dev"
  dev:
    rootToken: "dev-root-token-change-me"
  disableMlock: true
  listener:
    tlsDisable: true

resources:
  requests: { memory: "64Mi", cpu: "50m" }
  limits:   { memory: "256Mi", cpu: "250m" }

service:
  type: "ClusterIP"
