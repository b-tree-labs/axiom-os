apiVersion: v2
name: axiom-secrets
description: |
  Axiom secrets substrate — a self-hosted OpenBao (the OSS, API-compatible
  fork of HashiCorp Vault) server providing the default operational
  SecretStore backend (kv/v2) per the secrets extension ADR-003. Generic,
  site- and domain-agnostic chart; consumer layers supply only values
  overlays.

  Per ADR-031, this chart ships INSIDE the secrets extension so the
  extension owns its own deploy artifact. The `openbao` SecretStoreProvider
  and `axi secrets diagnose` read the same AXIOM_OPENBAO_* wiring this chart
  surfaces (see deploy/README.md).
type: application
version: 0.1.0        # chart version (bump on chart shape change)
appVersion: "2.2.0"   # openbao/openbao server version pinned by the chart
home: https://axiom.b-tree.dev
sources:
  - https://github.com/b-tree-labs/axiom-os
maintainers:
  - name: Axiom Labs
    email: hello@b-tree.dev
keywords:
  - openbao
  - secrets
  - vault
  - kv
