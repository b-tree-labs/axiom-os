<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Axiom</title>
<style>
  :root {
    --bg: #0a0e17; --bg2: #111827;
    --text: #e2e8f0; --text2: #94a3b8;
    --accent: #3b82f6; --accent2: #60a5fa;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
  }
  .container { max-width: 600px; padding: 40px; }
  h1 {
    font-size: 48px;
    font-weight: 800;
    letter-spacing: -1.5px;
    background: linear-gradient(135deg, #fff 30%, var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 16px;
  }
  p { color: var(--text2); font-size: 18px; line-height: 1.5; }
  .status {
    margin-top: 24px;
    padding: 12px 24px;
    background: rgba(59, 130, 246, 0.1);
    border: 1px solid rgba(59, 130, 246, 0.2);
    border-radius: 8px;
    font-size: 14px;
    color: var(--accent2);
  }
</style>
</head>
<body>
<div class="container">
  <h1>Axiom</h1>
  <p>Modular agentic platform.</p>
  <div class="status">API Server Running</div>
</div>
</body>
</html>
