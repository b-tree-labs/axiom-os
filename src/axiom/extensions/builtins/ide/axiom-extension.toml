[extension]
name = "ide"
version = "0.1.0"
description = "IDE detection, configuration, and extension management"
license = "Apache-2.0"
owner = "b-tree-labs"
aeos_version = "0.1.0"
builtin = true

[extension.compatibility]
python = ">= 3.11"
axiom = ">= 0.10"

[[extension.provides]]
kind = "cmd"
noun = "ide"
entry = "axiom.extensions.builtins.ide.cli:main"
description = "Configure your IDE for the best Axiom experience"
tier = "core"
intent_groups = ["build"]
