[extension]
name = "vault"
version = "0.1.0"
description = "KEEP — secret storage + capability token issuance. Per ADR-055 + prd-axiom-vault."
license = "Apache-2.0"
owner = "b-tree-labs"
aeos_version = "0.1.0"
builtin = true

[extension.compatibility]
python = ">= 3.11"
axiom = ">= 0.24"

[database]
needs_schema = true
migrations_path = "migrations"

# KEEP — the Steward + Governor that owns this primitive.
[[extension.provides]]
kind = "agent"
name = "keep"
entry = "axiom.extensions.builtins.vault:keep_persona_path"
persona = "agents/keep/persona.md"
description = "KEEP — capability-token lifecycle (issue, validate, expire, revoke) + outbound-call credential chaining via pluggable secrets backends."

[[extension.provides]]
kind = "tool"
name = "vault_get_capability"
entry = "axiom.extensions.builtins.vault.capability_store:get_capability"
description = "Acquire a fresh-or-cached capability for an action."
idempotent = true

[[extension.provides]]
kind = "tool"
name = "vault_outbound_call"
entry = "axiom.extensions.builtins.vault.outbound:outbound_call"
description = "Execute an outbound HTTP call under a capability. The ONLY plaintext-credential site."
idempotent = false
side_effects = "calls_network"

[[extension.provides]]
kind = "cmd"
noun = "vault"
entry = "axiom.extensions.builtins.vault.cli:cli"
subcommands = ["list", "issue", "revoke", "audit"]

# [sender] — ADR-066 servant-naming render metadata. HERALD renders
# this as the locale-appropriate possessive surface ("Ben's KEEP {version}")
# on every channel. The canonical principal (@keep:<context>) is derived,
# not declared here.
[sender]
display_name = "KEEP"
