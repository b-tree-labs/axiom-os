[extension]
name = "agents"
version = "0.1.0"
description = "Agent service lifecycle management"
license = "Apache-2.0"
owner = "b-tree-labs"
aeos_version = "0.1.0"
builtin = true

[extension.compatibility]
python = ">= 3.11"
axiom = ">= 0.10"

[[extension.provides]]
kind = "cmd"
noun = "agents"
entry = "axiom.extensions.builtins.agents.cli:main"
description = "Manage always-on agent services (start, stop, status)"
tier = "advanced"
intent_groups = ["maintain"]
