apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "axi-presence.slug" . }}
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: axi-presence
    axiom.ai/owner: {{ include "axi-presence.slug" . }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: axi-presence
      axiom.ai/owner: {{ include "axi-presence.slug" . }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: axi-presence
        axiom.ai/owner: {{ include "axi-presence.slug" . }}
    spec:
      serviceAccountName: {{ include "axi-presence.slug" . }}
      containers:
        - name: presence
          image: {{ .Values.image }}
          imagePullPolicy: {{ .Values.imagePullPolicy }}
          env:
            - name: AXI_PRINCIPAL
              value: {{ required "principal is required (@axi:<context>)" .Values.principal | quote }}
            - name: AXI_ACCOUNTABLE_HUMAN
              value: {{ .Values.accountableHuman | quote }}
            - name: SLACK_CHANNEL
              value: {{ .Values.channel | quote }}
            {{- range $k := list "SLACK_BOT_TOKEN" "SLACK_APP_TOKEN" "PRIVATE_LLM_API_KEY" }}
            - name: {{ $k }}
              valueFrom:
                secretKeyRef:
                  name: {{ include "axi-presence.secretName" $ }}
                  key: {{ $k }}
            {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
