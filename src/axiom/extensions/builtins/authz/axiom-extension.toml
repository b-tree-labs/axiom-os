[extension]
name = "authz"
version = "0.1.0"
description = "GUARD — unified authorization decision site. Per ADR-055 + prd-axiom-authz."
license = "Apache-2.0"
owner = "b-tree-labs"
aeos_version = "0.1.0"
builtin = true

[extension.compatibility]
python = ">= 3.11"
axiom = ">= 0.24"

# Schema-per-extension persistence per ADR-052.
[database]
needs_schema = true
migrations_path = "migrations"

# GUARD agent — the Reviewer + Governor class member that owns this primitive.
[[extension.provides]]
kind = "agent"
name = "guard"
entry = "axiom.extensions.builtins.authz:guard_persona_path"
persona = "agents/guard/persona.md"
description = "GUARD — deterministic authorization gatekeeper: evaluates rules, checks capability scope, tracks graduation, emits audit verdicts."

# The decide() tool — every primitive consults it.
[[extension.provides]]
kind = "tool"
name = "authz_decide"
entry = "axiom.extensions.builtins.authz.decide:decide"
description = "Decide whether an ActionEnvelope is permitted."
idempotent = true
side_effects = "writes_receipt"

# audit CLI noun lives here (per ADR-056 will be skill-backed when CLI lands).
[[extension.provides]]
kind = "cmd"
noun = "audit"
entry = "axiom.extensions.builtins.authz.cli:cli"
subcommands = ["list", "show", "chain", "causes", "explain"]

# [sender] — ADR-066 servant-naming render metadata. HERALD renders
# this as the locale-appropriate possessive surface ("Ben's GUARD {version}")
# on every channel. The canonical principal (@guard:<context>) is derived,
# not declared here.
[sender]
display_name = "GUARD"
