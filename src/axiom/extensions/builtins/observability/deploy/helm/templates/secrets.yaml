apiVersion: v1
kind: Secret
metadata:
  name: {{ include "axiom-observability.fullname" . }}-langfuse
  labels:
    {{- include "axiom-observability.labels" . | nindent 4 }}
type: Opaque
stringData:
  salt: {{ required "langfuse.salt is required (axi observe install mints if empty)" .Values.langfuse.salt | quote }}
  nextauthSecret: {{ required "langfuse.nextauthSecret is required" .Values.langfuse.nextauthSecret | quote }}
  encryptionKey: {{ required "langfuse.encryptionKey is required" .Values.langfuse.encryptionKey | quote }}
{{- if eq .Values.postgres.mode "internal" }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "axiom-observability.fullname" . }}-postgres
  labels:
    {{- include "axiom-observability.labels" . | nindent 4 }}
type: Opaque
stringData:
  password: {{ required "postgres.internal.password is required (axi observe install --db-password)" .Values.postgres.internal.password | quote }}
{{- end }}
{{- if eq .Values.clickhouse.mode "internal" }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "axiom-observability.fullname" . }}-clickhouse
  labels:
    {{- include "axiom-observability.labels" . | nindent 4 }}
type: Opaque
stringData:
  password: {{ required "clickhouse.internal.password is required" .Values.clickhouse.internal.password | quote }}
{{- end }}
