apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "axiom-observability.fullname" . }}-worker
  labels:
    {{- include "axiom-observability.labels" . | nindent 4 }}
    component: langfuse-worker
spec:
  replicas: {{ .Values.langfuse.workerReplicas }}
  selector:
    matchLabels:
      {{- include "axiom-observability.selectorLabels" . | nindent 6 }}
      component: langfuse-worker
  template:
    metadata:
      labels:
        {{- include "axiom-observability.selectorLabels" . | nindent 8 }}
        component: langfuse-worker
    spec:
      initContainers:
        - name: wait-postgres
          image: busybox:1.36
          command: ["sh", "-c"]
          args:
            - |
              set -eu
              until nc -z {{ include "axiom-observability.postgresHost" . }} 5432; do sleep 2; done
      containers:
        - name: langfuse-worker
          image: "{{ .Values.langfuse.image.repository }}:{{ .Values.langfuse.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy | default "IfNotPresent" }}
          # Same env block; the langfuse image switches mode on
          # container name / command — but here we just expose the
          # full env and let the upstream entrypoint pick up.
          command: ["node"]
          args: ["dist/worker.js"]
          env:
            {{- include "axiom-observability.langfuseEnv" . | nindent 12 }}
          resources:
            {{- toYaml .Values.langfuse.resources.worker | nindent 12 }}
