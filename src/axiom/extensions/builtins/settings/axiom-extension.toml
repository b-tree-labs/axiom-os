[extension]
name = "settings"
version = "0.1.0"
description = "View and edit Axiom settings"
license = "Apache-2.0"
owner = "b-tree-labs"
aeos_version = "0.1.0"
builtin = true

[extension.compatibility]
python = ">= 3.11"
axiom = ">= 0.10"

[[extension.provides]]
kind = "cmd"
noun = "settings"
entry = "axiom.extensions.builtins.settings.cli:main"
description = "View and edit Axiom settings"
tier = "core"
intent_groups = ["start"]
