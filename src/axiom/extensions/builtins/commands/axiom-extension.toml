[extension]
name = "commands"
version = "0.1.0"
description = "Cross-harness slash-command generator. Reads installed extensions' CLI verbs + chat slash commands; emits Claude/Cursor/Codex shims."
license = "Apache-2.0"
owner = "b-tree-labs"
aeos_version = "0.1.0"
builtin = true

[extension.compatibility]
python = ">= 3.11"
axiom = ">= 0.10"

[[extension.provides]]
kind = "cmd"
noun = "commands"
entry = "axiom.extensions.builtins.commands.cli:main"
description = "Generate cross-harness slash-command shims (Claude/Cursor/Codex) from installed extensions"
tier = "core"
intent_groups = ["build"]
