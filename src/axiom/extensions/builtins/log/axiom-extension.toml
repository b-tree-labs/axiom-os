[extension]
name = "log"
version = "0.1.0"
description = "Log inspection, verification, and management"
license = "Apache-2.0"
owner = "b-tree-labs"
aeos_version = "0.1.0"
builtin = true

[extension.compatibility]
python = ">= 3.11"
axiom = ">= 0.10"

[[extension.provides]]
kind = "cmd"
noun = "log"
entry = "axiom.extensions.builtins.log.cli:main"
description = "System operations log — query, entries, export, shift handoff"
tier = "core"
intent_groups = ["operate"]
