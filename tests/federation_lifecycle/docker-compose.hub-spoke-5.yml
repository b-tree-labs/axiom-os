# 5-node hub-and-spoke: one hub + four leaves.
#
# Each leaf registers ONLY the hub — no leaf-to-leaf edges. Used by
# test_hub_spoke_5_node.py to verify peer isolation: leaves reach each
# other only through the hub, and cannot see each other in `axi nodes list`.

services:
  hub:
    build:
      context: ../..
      dockerfile: tests/federation_lifecycle/Dockerfile.node
    image: axiom-fed-node:dev
    hostname: hub
    environment:
      AXIOM_NODE_NAME: hub
      AXIOM_NODE_ROLE: hub
    volumes:
      - hub_state:/home/axiom/.axi
      - harness_keys:/harness/keys:ro
    networks: [fednet]

  leaf1:
    image: axiom-fed-node:dev
    build:
      context: ../..
      dockerfile: tests/federation_lifecycle/Dockerfile.node
    hostname: leaf1
    environment:
      AXIOM_NODE_NAME: leaf1
      AXIOM_NODE_ROLE: leaf
    volumes:
      - leaf1_state:/home/axiom/.axi
      - harness_keys:/harness/keys:ro
    networks: [fednet]
    depends_on: [hub]

  leaf2:
    image: axiom-fed-node:dev
    build:
      context: ../..
      dockerfile: tests/federation_lifecycle/Dockerfile.node
    hostname: leaf2
    environment:
      AXIOM_NODE_NAME: leaf2
      AXIOM_NODE_ROLE: leaf
    volumes:
      - leaf2_state:/home/axiom/.axi
      - harness_keys:/harness/keys:ro
    networks: [fednet]
    depends_on: [hub]

  leaf3:
    image: axiom-fed-node:dev
    build:
      context: ../..
      dockerfile: tests/federation_lifecycle/Dockerfile.node
    hostname: leaf3
    environment:
      AXIOM_NODE_NAME: leaf3
      AXIOM_NODE_ROLE: leaf
    volumes:
      - leaf3_state:/home/axiom/.axi
      - harness_keys:/harness/keys:ro
    networks: [fednet]
    depends_on: [hub]

  leaf4:
    image: axiom-fed-node:dev
    build:
      context: ../..
      dockerfile: tests/federation_lifecycle/Dockerfile.node
    hostname: leaf4
    environment:
      AXIOM_NODE_NAME: leaf4
      AXIOM_NODE_ROLE: leaf
    volumes:
      - leaf4_state:/home/axiom/.axi
      - harness_keys:/harness/keys:ro
    networks: [fednet]
    depends_on: [hub]

networks:
  fednet:
    driver: bridge

volumes:
  hub_state:
  leaf1_state:
  leaf2_state:
  leaf3_state:
  leaf4_state:
  harness_keys:
