services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: axiom-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: axiom
      POSTGRES_PASSWORD: axiom
      POSTGRES_DB: axiom_db
    volumes:
      - axiom-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U axiom -d axiom_db"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  axiom-pgdata:
